groups:
  - name: igus.legacy_api
    rules:
      - alert: IgusLegacyApiTrafficHighDuringDeprecation
        expr: sum(rate(igus_legacy_api_requests_total{phase=~"deprecated|sunset"}[15m])) > 0.1
        for: 30m
        labels:
          severity: warning
          service: igus_service
        annotations:
          summary: "Legacy API traffic remains high during deprecation/sunset"
          description: "Legacy endpoints are still used above expected threshold. Drive migration to successor endpoints before removal phase."

      - alert: IgusLegacyApiRemovedButTrafficStillPresent
        expr: sum(rate(igus_legacy_api_requests_total{phase="removed"}[5m])) > 0
        for: 10m
        labels:
          severity: critical
          service: igus_service
        annotations:
          summary: "Traffic still hits removed legacy API"
          description: "Clients are calling endpoints after LEGACY_API_PHASE=removed and receiving 410. Roll back removal or update clients immediately."

      - alert: IgusLegacyPhaseRemovedEnabled
        expr: igus_legacy_api_phase{phase="removed"} == 1
        for: 1m
        labels:
          severity: info
          service: igus_service
        annotations:
          summary: "Legacy API removal phase is active"
          description: "Legacy endpoints are fail-closed with 410. Verify no critical clients remain on deprecated routes."
